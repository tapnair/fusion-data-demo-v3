"""The entry-point for Autodesk entity queries. This acts as the top-level API from which all queries must start."""
type Query {
  """Retrieves an object representing a hub.

A Hub is a container of projects, shared resources, and users with a common context.
@param {ID} hubId - The ID of the hub to return."""
  hub(hubId: ID!): Hub
  """Retrieves an object representing a hub by its external id.

A Hub is a container of projects, shared resources, and users with a common context.
@param {ID} dataManagementAPIHubId - The external ID of the hub to return."""
  hubByDataManagementAPIId(dataManagementAPIHubId: ID!): Hub
  """Retrieves all hubs that match the specified criteria.

A Hub is a container of projects, shared resources, and users with a common context.
@param {HubFilterInput=} filter - Specifies how to filter a list of hubs. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  hubs(filter: HubFilterInput, pagination: PaginationInput): Hubs
  """Retrieves an object representing a project from a specified hub.

A project is a shared workspace for teams of people to store, organize, and manage all related design data.
@param {ID} projectId - The ID of the project to retrieve."""
  project(projectId: ID!): Project
  """Retrieves an object representing a project by its external id.

A project is a shared workspace for teams of people to store, organize, and manage all related design data.
@param {ID} dataManagementAPIProjectId - The external ID of the project to retrieve."""
  projectByDataManagementAPIId(dataManagementAPIProjectId: ID!): Project
  """Retrieves all projects that match the specified filter criteria from a specified hub.
@param {ID} hubId - The ID of the hub that contains the projects.
@param {ProjectFilterInput=} filter - Specifies how to filter a list of projects. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  projects(hubId: ID!, filter: ProjectFilterInput, pagination: PaginationInput): Projects
  """Retrieve folder specified by the provided Id.
@param {ID} projectId - The ID of the project that contains the item.
@param {ID} folderId - The ID of the item to retrieve."""
  folder(projectId: ID!, folderId: ID!): Folder
  """Retrieve folder specified by the provided Id.
@param {ID} hubId - The ID of the Hub that contains the item.
@param {ID} folderId - The ID of the item to retrieve."""
  folderByHubId(hubId: ID!, folderId: ID!): Folder
  """Retrieves all subfolders within a specified folder that meet the filter criteria specified by the ``filter`` argument.
@param {ID} projectId - The ID of the project that contains the items.
@param {ID} folderId - The ID of the folder that contains the subfolders.
@param {FolderFilterInput=} filter - Specifies how to filter on folders. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  foldersByFolder(projectId: ID!, folderId: ID!, filter: FolderFilterInput, pagination: PaginationInput): Folders
  """Retrieves all subfolders within a specified folder that meet the filter criteria specified by the ``filter`` argument.
@param {ID} hubId - The ID of the Hub that contains the item.
@param {ID} folderId - The ID of the folder that contains the subfolders.
@param {FolderFilterInput=} filter - Specifies how to filter on folders. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  foldersByFolderInHub(hubId: ID!, folderId: ID!, filter: FolderFilterInput, pagination: PaginationInput): Folders
  """Retrieves all top level folders under a specified project that meet the filter criteria specified by the ``filter`` argument.
@param {ID} projectId - The ID of the project that contains the items.
@param {FolderFilterInput=} filter - Specifies how to filter on folders. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  foldersByProject(projectId: ID!, filter: FolderFilterInput, pagination: PaginationInput): Folders
  """Retrieves an object representing an item.

An item refers to a file or sub-folder that exists within a folder.
@param {ID} hubId - The ID of the Hub that contains the item.
@param {ID} itemId - The ID of the item to retrieve."""
  item(hubId: ID!, itemId: ID!): Item
  """Retrieves all items within a specified folder that meet the filter criteria specified by the ``filter`` argument.
@param {ID} hubId - The ID of the Hub that contains the item.
@param {ID} folderId - The ID of the folder that contains the items.
@param {ItemFilterInput=} filter - Specifies how to filter the content of a folder. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  itemsByFolder(hubId: ID!, folderId: ID!, filter: ItemFilterInput, pagination: PaginationInput): Items
  """Retrieves all top level items under a specified project that meet the filter criteria specified by the ``filter`` argument.
@param {ID} projectId - The ID of the project that contains the items.
@param {ItemFilterInput=} filter - Specifies how to filter the content of a folder. You can filter by name.
@param {PaginationInput=} pagination - Specifies how to split the response into multiple pages."""
  itemsByProject(projectId: ID!, filter: ItemFilterInput, pagination: PaginationInput): Items
  """Retrieves application information of APS Application based on Authentication token."""
  application: Application
  """Retrieves a Component based on the specified component ID and component state. State of the component can be provided with:
- composition and time arguments or,
- state argument
If component state is provided by both options, the query will be considered as invalid."""
  component(componentId: ID!, composition: BOMCompositionEnum = WORKING, time: DateTime, state: String): Component
  """Retrieves and compare a Component to a model. Intended for the root component only.
@param {CompareComponentInput} source - source component.
@param {CompareComponentInput} target - target input with either model or component. Only model is supported for now.
@param {CompareComponentFilterInput} filter - filter results based on primary reason enums"""
  compareComponent(source: CompareComponentInput!, target: CompareTargetInput!, filter: CompareComponentFilterInput): CompareComponentResult
  """Retrieves a Component and compare based on the specified state string.
@param {String} state - toComponentState string from a previously queried BOMRelation object. Should be used to continue traversal of subsequent level. Includes compare parameters and filter from the initial query."""
  componentFromState(state: String!): Component
  """Retrieves Components in bulk based on the list of specified Component inputs."""
  bulkComponents(input: [BulkComponentsQueryInput!]!): [BulkComponentsQueryResponse]
  """Retrieves Components in bulk based on the state of the Component inputs."""
  bulkComponentFromState(input: [BulkComponentFromStateQueryInput!]!): [BulkComponentFromStateQueryResponse]
  """A query to retrieve a Model at time"""
  model(modelId: ID!, composition: AssemblyCompositionEnum = WORKING, time: DateTime): Model
  """Retrieves Models in bulk - with one-to-one input and output semantics,
allowing for direct mapping of data."""
  bulkModels(input: [BulkModelsQueryInput!]!): [BulkModelsQueryResponse]
  drawing(drawingId: ID!, time: DateTime): Drawing
  """A query to retrieve a Version."""
  version(versionId: ID!): Version
  """A query to retrieve a HistoryChange by its id"""
  historyChange(historyChangeId: ID!): HistoryChange
  """Performs a hub-wide search across supported entity types.
Filter control via SearchResultTypeEnum - COMPONENT, MODEL, FOLDER, FILE(DesignItem, DrawingItem, BasicItem, ConfiguredDesignItem)
@param {ID!} hubId (required) - The hub to search within.
@param {SearchInput} searchCriteria - Please specify either query or searchFields.
- query: Free-text query string. There’s no explicit maximum length enforced for the search query string.
- searchFields: [PropertyNameValuePair] to match by specific searchable properties (values OR'ed within a property & AND'ed across different searchFields entries).
- desiredSearchResultTypes: [SearchResultTypeEnum] to restrict result types in Search Results; If empty or omitted, ALL supported types are returned by default (COMPONENT, MODEL, FILE, FOLDER).
- sort: [Sort] to order results by a propertyId in ASC/DESC order.
@param {PaginationInput} pagination (optional) - Cursor-based pagination (cursor, limit). Default pagination limit is 20 if not provided
Returns SearchPayload with:
- pagination: cursor and page size,
- SearchPayload:
- results: display name, optional thumbnail, match highlights, and the matched object (union).
- SearchResultMatch { matchedPropertyId: ID!, matchedText: String! }"""
  searchByHub(hubId: ID!, searchCriteria: SearchInput, pagination: PaginationInput): SearchPayload
  """Retrieves the list of searchable properties based for this hub.
@param {ID} hubId - ID for the hub from which you need to retrieve the components.
@param {PaginationInput} pagination - The pagination for this particular search."""
  searchablePropertiesByHub(hubId: ID!, pagination: PaginationInput): SearchableProperties
  """Retrieves BOMRelation based on specified bomRelationId and state.
@param {ID} bomRelationId - ID of the BOM Relation.
@param {String} state - toComponentState string from a previously queried BOMRelation object."""
  bomRelationFromState(bomRelationId: ID!, state: String): BOMRelation
  """Retrieves BOMRelations in bulk based on the list of specified inputs."""
  bulkBomRelationsFromState(input: [BulkBomRelationsFromStateQueryInput!]!): [BulkBomRelationsQueryResponse]
  """Retrieves API configuration settings for the specified API names.
@param {ApiConfigurationInfoInput} input - Input object containing the list of API names to retrieve configuration information for."""
  apiConfigurationInfo(input: ApiConfigurationInfoInput): [ApiConfigurationInfoPayload]!
  """Export status of a file.
@param {ExportStatusOfFileInput} input - Input object for getting the export status of a file."""
  exportStatusOfFile(input: ExportStatusOfFileInput): ExportStatusOfFilePayload
  """Retrieves an object representing a Group from a specified hub.
@param {ID} hubId - The ID of the hub that contains the group.
@param {ID} groupId - The ID of the group to retrieve."""
  group(hubId: ID!, groupId: ID!): Group
  """Retrieves all available roles for a specific workspace in a hub.
@param {ID} hubId - The ID of the hub that contains the workspace.
@param {String} workspaceUrn - The URN of the workspace to get roles for.
@param {PaginationInput} pagination - Specifies how to paginate through the workspace roles."""
  workspaceRoles(hubId: ID!, workspaceUrn: String!, pagination: PaginationInput): WorkspaceRoles!
}

