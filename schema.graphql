"""Filter relations based on compare results.
If not provided, defaults to include only primary reasons: IDENTICAL, TARGET_IS_SECONDARY_MODEL_TO_SOURCE and SOURCE_ONLY."""
input CompareComponentFilterInput {
  compare: CompareFilter
}

"""Provide a source/target component to compare to."""
input CompareComponentInput {
  composition: BOMCompositionEnum = WORKING
  id: ID!
  time: DateTime
}

"""Enums indicating the primary reason of difference."""
enum CompareComponentReasonEnum {
  """CAD and BOM consume the primary model"""
  IDENTICAL
  """Component is not consumed in either CAD or BOM"""
  NONE
  """Model is not consumed in CAD"""
  SOURCE_ONLY
  """CAD consumes secondary model, BOM represents the primary"""
  TARGET_IS_SECONDARY_MODEL_TO_SOURCE
  """Component is not consumed in BOM"""
  TARGET_ONLY
}

"""Return payload that contains a component and compare result."""
type CompareComponentResult {
  compareStatus: CompareComponentStatus!
  component: Component!
}

"""Enums indicating the secondary reason of difference."""
enum CompareComponentSecondaryReasonEnum {
  """CAD is out of date and does not reflect the latest save"""
  CAD_OUT_OF_DATE
  """Component is hidden due to parent being overridden as part"""
  PARENT_OVERRIDDEN_AS_PART
  """Component is present in the Secondary SPN, but is not present in the Primary"""
  PARENT_SECONDARY
  """Component is hidden due to parent being removed from all BOMs"""
  REFERENCE_ONLY
}

"""Object that contains the compare result."""
type CompareComponentStatus {
  primaryReason: CompareComponentReasonEnum!
  secondaryReason: CompareComponentSecondaryReasonEnum
}

"""Represents compare filters."""
input CompareFilter {
  primaryReason: [CompareComponentReasonEnum!]
}

"""Provide a target model to compare to."""
input CompareModelInput {
  composition: AssemblyCompositionEnum = WORKING
  id: ID!
  time: DateTime
}

"""Provide either a target model or component to compare to.
Only model is supported for now."""
input CompareTargetInput {
  component: CompareComponentInput
  model: CompareModelInput
}

"""An object representing an item in the bill of materials (BOM). It can be a part, an assembly, a sub-assembly or an end product which is the very top-level with no parent above it."""
type Component {
  """A system-generated ID that uniquely identifies this object."""
  id: ID!
  """The date and time used for traversing the BOM item"""
  timestamp: DateTime!
  """The current composition in which the Component is resolved."""
  composition: BOMCompositionEnum!
  """Component Description"""
  description: Property!
  """Name of the material from which the component consists."""
  materialName: Property
  """An aggregation of all of the materials present in the bodies of the model.
Value will be `Various` if there are different materials present.
For assemblies this value is not present."""
  totalCompositeMaterialName: Property
  """Name of the Component"""
  name: Property
  """Part number"""
  partNumber: Property!
  """Part number at tip"""
  tipPartNumber: Property!
  """Indicates whether this Bill of Materials (BOM) item has child items.
``true``: The BOM item has one or more child items.
``false``: The BOM item does not have any child items and represents a leaf in the BOM structure."""
  hasChildren: Boolean
  """Indicates the BomStructure property, which determines how a component should be treated in all Bills of Materials. as of now supported integer values:
"value": 0 (DEFAULT)
"value": 2 (HIDDEN_CHILDREN)"""
  bomStructureTypeProperty: Property!
  """Indicate whether model is the only member in its assigned part number group."""
  isStandalone: Boolean
  """Indicates whether this Component is time-bounded. In other words - at the time of resolution, is Component resolved at latest possible time."""
  isTip: Boolean!
  """A URL that provides a direct link to access the BOM in Fusion Team. If internal component, share link is null"""
  shareLink(viewType: BOMViewTypeEnum = STRUCTURED): Url
  """Item number"""
  itemNumber: ItemNumber
  """Fusion Manage extension fields."""
  lifecycle: Lifecycle
  """Revision information about managed item"""
  revision: Revision
  """State to be used for querying the BOM item"""
  componentState: String
  """Retrieves Base Properties present on a Component.
Pagination is currently not supported, the API will return all available base properties without pagination."""
  baseProperties(pagination: PaginationInput, filter: PropertyFilterInput): Properties
  """Retrieves custom properties present on a Component.
Pagination is currently not supported, the API will return all available custom properties without pagination."""
  customProperties(pagination: PaginationInput, filter: PropertyFilterInput): Properties
  """Retrieves computed properties present on a Component, at time which is provided by computeTime argument.
Between Component state time and provided computeTime, Component state time will take precedence.
This API require ids in filter, which is mandatory input. Maximum size of ids can be 20."""
  computedProperties(filter: PropertyFilterInput!, computeTime: DateTime): ComputedProperties!
  """Retrieves all properties present on a Component.
Pagination is currently not supported, the API will return all available properties without pagination."""
  allProperties(pagination: PaginationInput): Properties
  """Represents the primary model of the Part Number Group (Component).
Might not exist if the corresponding BOM item does not have a CAD model."""
  primaryModel: Model
  """Contains a flat list of BOM relations for this BOM item for a specific depth
(default is 0 which means all BOM relations, whole BOM tree).
Currently only depth 1 is supported."""
  bomRelations(depth: Int = 0, pagination: PaginationInput): BOMRelations!
  """Retrieves the thumbnail of the component"""
  thumbnail: Thumbnail
  """Indicates whether a user has WRITE access on this component."""
  isWritableByUser: Boolean!
  """Version associated to this component in the context of a BomRelation query"""
  version: Version
  """An object representing the hub that contains this component."""
  hub: Hub!
  """Retrieves parts list of a component."""
  partsList(pagination: PaginationInput, filter: PropertyFilterInput, computeTime: DateTime): PartsListItems!
}

