"""A role definition containing collections of workspace and workflow permissions that can be assigned to user groups in Fusion Manage."""
type WorkspaceRole {
  """Display name of the role, representing the collection of permissions it contains."""
  name: String!
  """Unique resource name (URN) used to reference this role when assigning permissions to user groups."""
  urn: String!
}

"""Paginated collection of permission-based roles available for assignment to user groups within a specific workspace."""
type WorkspaceRoles {
  """Pagination metadata for navigating through the workspace roles results."""
  pagination: Pagination
  """Available permission roles for the workspace, each containing collections of workspace and workflow permissions that can be assigned to user groups."""
  results: [WorkspaceRole!]!
}

type Workspaces {
  """Contains information about the current page, when results are split into multiple pages."""
  pagination: Pagination
  """List of objects representing workspaces."""
  results: [Workspace!]!
}

"""Input type for filtering workspaces."""
input WorkspacesFilterInput {
  name: String!
}

