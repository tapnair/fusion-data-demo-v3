input SearchInput {
  query: String
  searchFields: [PropertyNameValuePair]
  desiredSearchResultTypes: [SearchResultTypeEnum]
  sort: [Sort]
}

type SearchPayload {
  pagination: Pagination!
  """List of results that matched the criteria """
  results: [SearchResult!]!
}

type SearchResult {
  """The reason we matched this particular item.  This can be used to show highlights in the UI."""
  matches: [SearchResultMatch!]!
  """The search result name that should be shown to the user. This is surfaced to the root of the search result object to give us the ability to provide the caller a hint on what should be displayed to the user regardless of the object type returned in the union."""
  name: String!
  searchResultObject: SearchResultObjectUnion!
  """The relevancy score from the underlying search system. This value is calculated at the time of the query and will change over time as more data is added to the search system. Higher values indicate more relevant results. The score can be null if the underlying search system did not compute a score for this result."""
  score: Float
  """Not all search result objects have a thumbnail associated with them, surfacing this to the root of the search result object gives us the ability to provide the caller a thumbnail that can be displayed """
  thumbnail: Thumbnail
}

type SearchResultMatch {
  """The property id on which this match occurred. """
  matchedPropertyId: ID!
  """The match text including highlight indicators """
  matchedText: String!
}

